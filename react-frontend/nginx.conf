server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files $uri $uri/ /index.html;
    }

    # Serve the app under /distr/. `alias` maps /distr/assets/x.js to
    # /usr/share/nginx/html/assets/x.js (the real location of the files).
    location /distr/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }
}
