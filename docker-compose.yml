networks:
  distr-network:
volumes:
  preprocessed_data:

services:
  preprocessor:
    container_name: preprocessor
    image: preprocessor:latest
    build:
      context: ./preprocess
      dockerfile: Dockerfile
    networks:
      - distr-network
    volumes:
      - preprocessed_data:/data
  archive_reader:
    container_name: archive_reader
    image: archive_reader:latest
    build:
      context: ./archive_reader
      dockerfile: Dockerfile
    networks:
      - distr-network
    depends_on:
      - nats
      - sampler
  data_enricher:
    deploy:
      replicas: 3
      mode: replicated
    image: data_enricher:latest
    build:
      context: ./
      dockerfile: data_enricher/Dockerfile
    networks:
      - distr-network
    depends_on:
      - nats
      - sampler
  data_synchronizer:
    container_name: data_synchronizer
    image: data_synchronizer:latest
    build:
      context: ./
      dockerfile: data_synchronizer/Dockerfile
    networks:
      - distr-network
    depends_on:
      - nats
      - sampler
  websocket_server:
    container_name: websocket_server
    image: websocket_server:latest
    build:
      context: ./
      dockerfile: websocket_server/Dockerfile
    networks:
      - distr-network
    depends_on:
      - nats
      - sampler
    ports:
      - "9001:9001"
  sampler:
    container_name: sampler
    image: sampler:latest
    build:
      context: ./sampler
      dockerfile: Dockerfile
    networks:
      - distr-network
    depends_on:
      nats:
        condition: service_started
      preprocessor:
        condition: service_completed_successfully
    volumes:
      - preprocessed_data:/data
  frontend:
    container_name: frontend
    image: frontend
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    networks:
      - distr-network
    depends_on:
      - nats
      - sampler
    volumes:
      - preprocessed_data:/data
    ports:
      - "3001:3000"
      - "7999:8080"
      - "7998:80"
  nats:
    image: nats:latest
    command:
      - "-c"
      - "/etc/nats/nats-server.conf"
      - "-js"
      - "--routes=nats-route://ruser:T0pS3cr3t@nats-seed:6222"
    volumes:
      - ./nats/nats_conf/nats-server1.conf:/etc/nats/nats-server.conf:ro
    expose:
      - "4222"
      - "6222"
      - "8222"
    depends_on:
      - nats-seed
    networks:
      - distr-network

  nats-seed:
    image: nats:latest
    command:
      - "-c"
      - "/etc/nats/nats-server.conf"
      - "-js"
    volumes:
      - ./nats/nats_conf/nats-server.conf:/etc/nats/nats-server.conf:ro
    ports:
      - "4222:4222"
      - "8222:8222"
    expose:
      - "6222"
    networks:
      - distr-network